<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Arboryx — Turning Market Noise Into Your Edge</title>
  <meta name="description" content="Arboryx surfaces daily market findings across robotics, crypto, AI, space &amp; defense, power &amp; energy, and strategic minerals." />

  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/landing.css" />
</head>
<body>
  <div id="site">

    <!-- ============================  HEADER  ============================ -->
    <header class="site-header">
      <a class="brand" href="/" aria-label="Arboryx home">
        <img class="brand-mark" src="assets/main-logo.png" alt="Arboryx" width="64" height="64" />
        <span class="brand-text">
          <span class="brand-name">Arboryx.ai</span>
          <span class="brand-slogan">Turning Market Noise Into Your Edge</span>
        </span>
      </a>

      <nav class="header-nav" aria-label="Primary">
        <a class="nav-link active" href="#new-growths">New Growths</a>
        <button type="button" class="auth-stub" disabled aria-disabled="true">
          Sign in (coming soon)
        </button>
      </nav>
    </header>

    <!-- ============================  MAIN  ============================== -->
    <main class="grove-console" id="new-growths" aria-label="Recent growth across the Arboryx.ai grove">
      <div class="console-banner">
        <h1 class="console-title"><span data-grove-title>Hover the Grove. See what's growing across the thematic sectors.</span><span class="console-sub" data-grove-subtitle>(one leaf, one signal · denser trees mean busier sectors · hover to read, click to explore)</span></h1>
        <div class="console-meta">
          <span class="last-updated"><span data-last-updated>loading…</span></span>
        </div>
      </div>

      <svg class="grove-canvas" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="region" aria-label="Grove">

        <defs>
          <!-- Canonical tree glyph; each <g class="tree"> places a copy via <use>.
               Coordinates are centered at (0,0) at the trunk base; tree grows upward. -->
          <!-- Skeleton: trunk + branches + ground only.  Leaves are rendered
               per tree by scripts/grove.js, one ellipse per recent entry. -->
          <symbol id="tree-glyph" overflow="visible">
            <line class="tree-ground" x1="-30" y1="0"   x2="30"  y2="0" />
            <line class="tree-trunk"  x1="0"   y1="0"   x2="0"   y2="-105" />
            <!-- Lower / "main" branches reach widest. -->
            <line class="tree-branch b-main" x1="0" y1="-45"  x2="-62" y2="-88" />
            <line class="tree-branch b-main" x1="0" y1="-60"  x2="64"  y2="-95" />
            <!-- Upper / "sub" branches reach high. -->
            <line class="tree-branch b-sub"  x1="0" y1="-80"  x2="-36" y2="-138" />
            <line class="tree-branch b-sub"  x1="0" y1="-80"  x2="38"  y2="-135" />
            <!-- Crown tip. -->
            <line class="tree-branch b-tip"  x1="0" y1="-105" x2="0"   y2="-152" />
          </symbol>
        </defs>

        <!-- 6 sectors — sporadic positions on a 1200×720 canvas, spaced so trees
             don't overlap. Each <g> sets --cc for its sector color (cat0..cat5). -->

        <g class="tree" data-sector="Robotics" transform="translate(180, 260)" style="--cc: var(--cat0)">
          <use href="#tree-glyph" />
          <g class="leaf-cluster" data-leaves-for="Robotics"></g>
          <text class="tree-label" x="0" y="22">Robotics</text>
          <text class="tree-count" x="0" y="44" data-sector-count="Robotics" data-pending>—</text>
        </g>

        <g class="tree" data-sector="Crypto" transform="translate(600, 260)" style="--cc: var(--cat1)">
          <use href="#tree-glyph" />
          <g class="leaf-cluster" data-leaves-for="Crypto"></g>
          <text class="tree-label" x="0" y="22">Crypto</text>
          <text class="tree-count" x="0" y="44" data-sector-count="Crypto" data-pending>—</text>
        </g>

        <g class="tree" data-sector="AI Stack" transform="translate(1020, 260)" style="--cc: var(--cat2)">
          <use href="#tree-glyph" />
          <g class="leaf-cluster" data-leaves-for="AI Stack"></g>
          <text class="tree-label" x="0" y="22">AI Stack</text>
          <text class="tree-count" x="0" y="44" data-sector-count="AI Stack" data-pending>—</text>
        </g>

        <g class="tree" data-sector="Space &amp; Defense" transform="translate(180, 612)" style="--cc: var(--cat3)">
          <use href="#tree-glyph" />
          <g class="leaf-cluster" data-leaves-for="Space &amp; Defense"></g>
          <text class="tree-label" x="0" y="22">Space &amp; Defense</text>
          <text class="tree-count" x="0" y="44" data-sector-count="Space &amp; Defense" data-pending>—</text>
        </g>

        <g class="tree" data-sector="Power &amp; Energy" transform="translate(600, 612)" style="--cc: var(--cat4)">
          <use href="#tree-glyph" />
          <g class="leaf-cluster" data-leaves-for="Power &amp; Energy"></g>
          <text class="tree-label" x="0" y="22">Power &amp; Energy</text>
          <text class="tree-count" x="0" y="44" data-sector-count="Power &amp; Energy" data-pending>—</text>
        </g>

        <g class="tree" data-sector="Strategic Minerals" transform="translate(1020, 612)" style="--cc: var(--cat5)">
          <use href="#tree-glyph" />
          <g class="leaf-cluster" data-leaves-for="Strategic Minerals"></g>
          <text class="tree-label" x="0" y="22">Strategic Minerals</text>
          <text class="tree-count" x="0" y="44" data-sector-count="Strategic Minerals" data-pending>—</text>
        </g>

      </svg>

      <aside class="legend" aria-label="Recency legend">
        <div class="legend-row legend-head">
          <span class="legend-title">Recency</span>
          <button type="button" class="mute-toggle" id="muteToggle"
                  aria-pressed="false" title="Mute hover sound">
            <svg class="mute-icon-on"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M11 5L6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
            <svg class="mute-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M11 5L6 9H2v6h4l5 4z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>
          </button>
        </div>
        <div class="legend-strip" aria-hidden="true">
          <span style="background: var(--leaf-d0)"></span>
          <span style="background: var(--leaf-d1)"></span>
          <span style="background: var(--leaf-d2)"></span>
          <span style="background: var(--leaf-d3)"></span>
          <span style="background: var(--leaf-d4)"></span>
          <span style="background: var(--leaf-d5)"></span>
          <span style="background: var(--leaf-d6)"></span>
        </div>
        <div class="legend-labels">
          <span>today</span>
          <span>7d ago</span>
        </div>
      </aside>
    </main>

    <!-- ============================  FOOTER  ============================ -->

        </button>
      </div>

      <!-- Right: copyright (also acts as Home) -->
      <div class="footer-right">
        <a class="copyright-home" href="/" aria-label="Home">
          © <span data-dynamic-year>2026</span> Arboryx.ai · All rights reserved
        </a>
      </div>
    </footer>

  </div>

  <!-- Config first (generated by frontend/deploy.sh from arboryx_frontend.config),
       then landing.js. Both deferred so they run in order after parse. -->
  <script src="scripts/config.js" defer></script>
  <script src="scripts/landing.js" defer></script>
  <script src="scripts/grove.js" defer></script>
</body>
</html>
